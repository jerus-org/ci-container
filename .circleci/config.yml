version: 2.1

orbs:
  toolkit: jerus-org/circleci-toolkit@4.9.5

filters: &filters
  tags:
    only: /.*/

executors:
  ubuntu:
    docker:
      - image: cimg/base:2025.07@sha256:aff996311c7d3ecdf0925f5856d79d5bd2d4773bd2931ef4d65f584e5f0e800c

commands:
  test_rolling_cmd:
    description: >
      Build and test rolling 6-month multi-version image.
      Versions are calculated automatically based on the current stable
      Rust version in the base image (current - 4 releases).
    steps:
      - run:
          name: Build and test rolling image
          command: |
            set -exo pipefail

            REPO=jerusdp/ci-rust
            docker build \
                -f Dockerfile \
                -t ${REPO}:rolling-6mo-test \
                --target test .
            docker run --rm ${REPO}:rolling-6mo-test

  publish_rolling_cmd:
    description: >
      Build and publish rolling 6-month images (final and wasi variants).
      Versions are calculated automatically based on the current stable
      Rust version in the base image (current - 4 releases).
    steps:
      - run:
          name: Publish rolling-6mo image
          command: |
            set -exo pipefail

            REPO=jerusdp/ci-rust
            VERSION=<< pipeline.git.tag >>
            # TAG=${REPO}:rolling-6mo-${VERSION}
            TAG=${REPO}:rolling-6mo
            docker build \
                -f Dockerfile \
                -t ${TAG} \
                --target final .
            echo "${DOCKERHUB_PASSWORD}" | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push ${TAG}
      - run:
          name: Publish rolling-6mo-wasi image
          command: |
            set -exo pipefail

            REPO=jerusdp/ci-rust
            VERSION=<< pipeline.git.tag >>
            # TAG=${REPO}:rolling-6mo-wasi-${VERSION}
            TAG=${REPO}:rolling-6mo-wasi
            docker build \
                -f Dockerfile \
                -t ${TAG} \
                --target wasi .
            echo "${DOCKERHUB_PASSWORD}" | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push ${TAG}

  publish_base_cmd:
    steps:
      - run:
          name: Publish for minimum version base
          command: |
            REPO=jerusdp/ci-rust
            VERSION=<< pipeline.git.tag >>
            # TAG=${REPO}:base-${VERSION}
            TAG=${REPO}:base

            INPUT_RELEASE_VERSION=0.1.0
            docker build -t ${TAG} --target final .
            echo "${DOCKERHUB_PASSWORD}" | docker login -u $DOCKERHUB_USERNAME --password-stdin
            docker push ${TAG}

jobs:
  publish_base:
    executor: ubuntu
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - publish_base_cmd

  test_rolling:
    description: >
      Test rolling 6-month multi-version image.
      Versions are calculated automatically from the base Rust image.
    executor: ubuntu
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - test_rolling_cmd

  publish_rolling:
    description: >
      Publish rolling 6-month multi-version images.
      Versions are calculated automatically from the base Rust image.
    executor: ubuntu
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - publish_rolling_cmd

workflows:
  validation:
    when:
      and:
        - not:
            equal: [scheduled_pipeline, << pipeline.trigger_source >>]
    jobs:
      - toolkit/security:
          name: security
          cargo_audit: false
          context:
            - SonarCloud
      - test_rolling:
          filters:
            branches:
              ignore: main

  deploy:
    when:
      not:
        equal: ["", << pipeline.git.tag >>]
    jobs:
      - publish_base:
          filters: *filters
      - publish_rolling:
          requires:
            - publish_base
          filters: *filters
